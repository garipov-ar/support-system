name: Build & Deploy

"on":
  push:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: support_db
          POSTGRES_USER: support_user
          POSTGRES_PASSWORD: support_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Lint with flake8
        run: |
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Type check with mypy
        continue-on-error: true
        env:
          SECRET_KEY: "dummy-secret-key"
          POSTGRES_DB: "dummy"
          POSTGRES_USER: "dummy"
          POSTGRES_PASSWORD: "dummy"
          POSTGRES_HOST: "localhost"
          POSTGRES_PORT: "5432"
          TELEGRAM_BOT_TOKEN: "dummy"
        run: |
          cd backend
          mypy apps --ignore-missing-imports
      - name: Run Tests
        env:
          SECRET_KEY: "test-secret-key"
          DEBUG: "1"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
          POSTGRES_DB: support_db
          POSTGRES_USER: support_user
          POSTGRES_PASSWORD: support_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          TELEGRAM_BOT_TOKEN: "dummy-token"
        run: |
          cd backend
          pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Convert repository name to lowercase
        id: repo
        run: echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.REPO_LOWER }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ${{ secrets.PROJECT_PATH }}
            export IMAGE_NAME=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
            echo "Pulling images with prefix: $IMAGE_NAME"
            docker pull $IMAGE_NAME-backend:latest
            docker-compose up -d --no-build
            docker image prune -f
