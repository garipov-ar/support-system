services:
  db:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-support}
      POSTGRES_USER: ${POSTGRES_USER:-support}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-support}
      PYTHONUNBUFFERED: 1
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  web:
    image: ${IMAGE_NAME:-ghcr.io/garipov-ar/support-system}-backend:latest
    build: ./backend
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/2
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    env_file:
      - .env

  bot:
    image: ${IMAGE_NAME:-ghcr.io/garipov-ar/support-system}-backend:latest
    build: ./backend
    restart: unless-stopped
    command: python manage.py runbot
    depends_on:
      - web
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    environment:
      PYTHONUNBUFFERED: 1
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    env_file:
      - .env

  monitor:
    image: ${IMAGE_NAME:-ghcr.io/garipov-ar/support-system}-backend:latest
    build: ./backend
    restart: unless-stopped
    command: python manage.py monitor_bot
    depends_on:
      - web
    volumes:
      - ./backend:/app
    environment:
      PYTHONUNBUFFERED: 1
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    env_file:
      - .env

  worker:
    image: ${IMAGE_NAME:-ghcr.io/garipov-ar/support-system}-backend:latest
    build: ./backend
    restart: unless-stopped
    command: celery -A config worker -l info
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/2
    env_file:
      - .env

  beat:
    image: ${IMAGE_NAME:-ghcr.io/garipov-ar/support-system}-backend:latest
    build: ./backend
    restart: unless-stopped
    command: celery -A config beat -l info
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/2
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data:
